services:
  configurator:
    environment:
      PROJECT_CLONE_URL: https://github.com/ajeetraina/labspace-sbx

  # Uses the ttyd workspace image for its cmd-server (handles Run button)
  # Port 8085 is intentionally NOT published here — Mac ttyd owns that port
  workspace:
    image: dockersamples/labspace-workspace-ttyd:latest
    ports: !override []
    environment:
      PORT: "8086"

  interface:
    environment:
      WORKSPACE_TYPE: ttyd
