services:
  configurator:
    environment:
      PROJECT_CLONE_URL: https://github.com/ajeetraina/labspace-sbx

  workspace:
    image: ajeetraina/labspace-workspace-ttyd:latest
    pull_policy: never
    ports: !override []
    environment:
      PORT: "8086"

  interface:
    environment:
      WORKSPACE_TYPE: ttyd
